<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px}button,input,select,textarea{font:inherit}input,select,textarea{width:100%;border:1px solid #ccc;border-radius:8px;padding:8px 10px;background:#fff}button{border:1px solid #ccc;border-radius:8px;background:#fff;padding:7px 12px;cursor:pointer}button:hover{background:#f0f0ec}.btn-primary{background:#534AB7;color:#fff;border-color:#534AB7}.btn-t{background:#C8420A;color:#fff;border-color:#C8420A}.btn-c{background:#0A7AC8;color:#fff;border-color:#0A7AC8}.btn-danger{color:#A32D2D;border-color:#F09595}.btn-green{color:#27500A;border-color:#97C459}.topbar{background:#fff;border-bottom:1px solid #ddd;padding:12px 16px;display:flex;gap:10px;align-items:center;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.06)}.title{font-weight:700;font-size:16px;margin-right:auto}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#E8A020;margin-right:5px}.dot.ok{background:#3B6D11}.dot.err{background:#aaa}.stat-row{display:flex;gap:8px;padding:10px 12px}.stat{flex:1;background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:10px 14px}.stat-label{font-size:11px;color:#888}.stat-val{font-size:20px;font-weight:700}.tabs,.toolbar{display:flex;gap:8px;align-items:center;background:#fff;border-bottom:1px solid #e5e5e5;padding:8px 12px;flex-wrap:wrap}.tab{padding:6px 14px;border:1px solid #ccc;border-radius:99px;cursor:pointer}.tab.active-all{background:#534AB7;color:#fff}.tab.active-T{background:#C8420A;color:#fff}.tab.active-C{background:#0A7AC8;color:#fff}.list{padding:10px 12px 80px}.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.card.shop-T{border-left:4px solid #C8420A}.card.shop-C{border-left:4px solid #0A7AC8}.row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.between{justify-content:space-between}.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;background:#EEEDFE;color:#3C3489}.badge-T{background:#FDE8DF;color:#C8420A}.badge-C{background:#DCF0FC;color:#0A5A96}.body{font-size:13px;color:#666;line-height:1.9;margin-top:8px}.body strong{color:#111}.empty{text-align:center;color:#999;padding:50px 10px}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;border-radius:99px;padding:10px 20px;z-index:99}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}.modal-bg.show{display:flex}.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow:auto;padding:20px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}.span2{grid-column:span 2}label{display:block;font-size:12px;color:#666;margin-bottom:4px}.error{background:#FCEBEB;border:1px solid #F09595;color:#791F1F;border-radius:10px;padding:12px;margin:12px;white-space:pre-wrap;word-break:break-all}.small{font-size:12px;color:#888}@media(max-width:600px){.form-grid{grid-template-columns:1fr}.span2{grid-column:span 1}.stat-row{flex-direction:column}}

/* гӮ№гғһгғӣе…ҘеҠӣз”»йқўгӮ’гӮігғігғ‘гӮҜгғҲеҢ– */
.form-actions{position:sticky;bottom:0;background:#fff;padding:10px 0 0;margin-top:10px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid #eee}

}

<body>
<div id="root"></div>
<div id="modalBg" class="modal-bg"></div>
<div id="toast" class="toast" style="display:none"></div>
<script>
window.onerror=function(msg,src,line,col,err){document.getElementById('root').innerHTML='<div class="error"><b>з”»йқўгӮЁгғ©гғј</b>\n'+msg+'\nиЎҢ:'+line+' еҲ—:'+col+'</div>';};
var GAS_URL='https://script.google.com/macros/s/AKfycbwfWqmkUPUi4Q2bwwSi01lW4xqCgtb84Ut6MpuwJDgHr7oYR11y_CTQHOosdZNxSA7N/exec';
var SHOPS=[{code:'T',name:'гғҶгӮЈгӮўгғ©'},{code:'C',name:'гӮӯгғҘгғјгғҲ'}];
var COURSES_BY_SHOP={T:[{l:'60',p:17000},{l:'70',p:19000},{l:'80',p:21000},{l:'90',p:23000},{l:'120',p:33000},{l:'150',p:41000},{l:'180',p:49000}],C:[{l:'60',p:16000},{l:'80',p:21000},{l:'100',p:26000},{l:'120',p:31000},{l:'140',p:36000},{l:'160',p:41000},{l:'180',p:46000}]};
var CASTS=['гғҰгғӘгӮ«','гғӣгғҺгӮ«','гғ¬гғі','гӮөгғҠ','гӮ«гғ¬гғі','гӮ№гғўгғў','гғӘгғігӮ«','гғҲгғў','гғҰгӮҰгӮӯ','гғһгӮ·гғӯ','гғҒгӮ«','гғҠгғҠгӮі','гғ’гғҠгӮҝ','гғҠгғҹ','гғЎгӮ°','гӮ«гӮ№гғҹ'];
var HOTELS=['гӮ·гғҶгӮЈ','гӮўгӮӨгғҚгӮӨгғі','гғўгғјгғҶгғ«','HP','гғ©гғҡ','гғҸгӮӨгғҸгӮӨ','гҒқгҒ®д»–'];
var STATUS=['0','-1000','-2000','-3000','-4000'];
var rows=[],shopFilter='all',todayOnly=false,searchText='',showForm=false,editId=null,form={},syncing=false,_id=9000,conn='connecting',errMsg='';
function td(){return new Date().toISOString().slice(0,10)}
function makeEmpty(shop){shop=shop||'T';var c=COURSES_BY_SHOP[shop][0];return{date:td(),time:'',shop:shop,cast:'',customer:'',phone:'',hotel:'гӮ·гғҶгӮЈ',room:'',course:c.l,status:'0',shimei:'гғ•гғӘгғј',place:''}}
function normalizePhone(v){var phone=String(v||'').replace(/[^0-9]/g,'');if(phone&&phone.charAt(0)!=='0'&&phone.length>=10&&phone.length<=11){phone='0'+phone}return phone}
function formatTime(v){if(!v)return'';var s=String(v);var m=s.match(/(\d{1,2}):(\d{2})/);if(m)return m[1].padStart(2,'0')+':'+m[2];var d=new Date(v);if(!isNaN(d.getTime()))return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');return''}
function toJp(d){if(!d)return'';var p=String(d).split('-');return p.length===3?p[1]+'/'+p[2]:d}
function fp(n){var v=Number(n);return !v?'пјҚ':v.toLocaleString('ja-JP')+'еҶҶ'}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function msg(t){var el=document.getElementById('toast');el.textContent=t;el.style.display='block';setTimeout(function(){el.style.display='none'},3000)}
function shopName(code){return code==='T'?'гғҶгӮЈгӮўгғ©':code==='C'?'гӮӯгғҘгғјгғҲ':(code||'')}
function post(payload){return fetch(GAS_URL,{method:'POST',redirect:'follow',body:JSON.stringify(payload)}).then(function(r){return r.text()}).then(function(t){try{return JSON.parse(t)}catch(e){return{success:false,error:'JSONгӮЁгғ©гғј:'+t.slice(0,100)}}}).catch(function(e){return{success:false,error:e.message}})}
function load(){conn='connecting';syncing=true;render();fetch(GAS_URL,{redirect:'follow'}).then(function(r){return r.text()}).then(function(t){var d;try{d=JSON.parse(t)}catch(e){throw new Error('GASгҒ®еҝңзӯ”гҒҢJSONгҒ§гҒҜгҒӮгӮҠгҒҫгҒӣгӮ“\n'+t.slice(0,300))}if(d.success){rows=(d.data||[]).map(function(x){x.phone=normalizePhone(x.phone);x.shopCode=x.shopCode||x.shop||'';x.shimei=x.shimei||'гғ•гғӘгғј';x.place=x.place||'';x.time=formatTime(x.time);return x});conn='ok';msg('вң“ '+rows.length+'д»¶гӮ’иӘӯгҒҝиҫјгҒҝгҒҫгҒ—гҒҹ')}else{conn='error';errMsg=d.error||'дёҚжҳҺгҒӘгӮЁгғ©гғј'}}).catch(function(e){conn='error';errMsg=e.message}).finally(function(){syncing=false;render()})}
function getFiltered(){var list=rows.filter(function(r){if(shopFilter!=='all'&&(r.shopCode||r.shop)!==shopFilter)return false;if(todayOnly&&r.date!==td())return false;if(searchText){var q=searchText.toLowerCase();return [r.customer,r.cast,r.phone,r.hotel,r.room,r.place,r.shimei].some(function(v){return String(v||'').toLowerCase().indexOf(q)>=0})}return true});list.sort(function(a,b){return String(a.date+a.time)<String(b.date+b.time)?1:-1});return list}
var searchDebounceTimer=null;
function onSearchInput(el){
  searchText=el.value;
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer=setTimeout(render,200);
}
function render(){
  var active=document.activeElement;
  var restoreSearch=active&&active.id==='searchInput';
  var selStart=restoreSearch?active.selectionStart:null;
  var selEnd=restoreSearch?active.selectionEnd:null;
  var root=document.getElementById('root');var todayRows=rows.filter(function(r){return r.date===td()});var cntT=todayRows.filter(function(r){return (r.shopCode||r.shop)==='T'}).length;var cntC=todayRows.filter(function(r){return (r.shopCode||r.shop)==='C'}).length;var filtered=getFiltered();var html='';html+='<div class="topbar"><b class="title">дәҲзҙ„з®ЎзҗҶ</b><span class="small"><span class="dot '+(conn==='ok'?'ok':conn==='error'?'err':'')+'"></span>'+(conn==='ok'?'гӮ·гғјгғҲйҖЈжҗәдёӯ':conn==='error'?'жҺҘз¶ҡгӮЁгғ©гғј':'жҺҘз¶ҡдёӯ...')+'</span><button class="btn-green" onclick="load()">еҶҚиӘӯиҫј</button><button onclick="exportCSV()">CSV</button></div>';html+='<div class="stat-row"><div class="stat"><div class="stat-label">жң¬ж—Ҙ е…ЁдҪ“</div><div class="stat-val">'+todayRows.length+' д»¶</div></div><div class="stat"><div class="stat-label">гғҶгӮЈгӮўгғ©</div><div class="stat-val">'+cntT+' д»¶</div></div><div class="stat"><div class="stat-label">гӮӯгғҘгғјгғҲ</div><div class="stat-val">'+cntC+' д»¶</div></div></div>';html+='<div class="tabs"><span class="tab '+(shopFilter==='all'?'active-all':'')+'" onclick="shopFilter=\'all\';render()">е…Ёеә—иҲ—</span><span class="tab '+(shopFilter==='T'?'active-T':'')+'" onclick="shopFilter=\'T\';render()">гғҶгӮЈгӮўгғ©</span><span class="tab '+(shopFilter==='C'?'active-C':'')+'" onclick="shopFilter=\'C\';render()">гӮӯгғҘгғјгғҲ</span><span style="margin-left:auto"></span><button class="btn-t" onclick="openNew(\'T\')">пјӢT</button><button class="btn-c" onclick="openNew(\'C\')">пјӢC</button></div>';html+='<div class="toolbar"><input id="searchInput" style="flex:1;min-width:170px" placeholder="еҗҚеүҚгғ»гӮӯгғЈгӮ№гғҲгғ»йӣ»и©ұгғ»гғӣгғҶгғ«гҒ§жӨңзҙў" value="'+esc(searchText)+'" oninput="onSearchInput(this)"><button class="'+(todayOnly?'btn-primary':'')+'" onclick="todayOnly=!todayOnly;render()">'+(todayOnly?'вң“ еҪ“ж—Ҙ':'еҪ“ж—ҘгҒ®гҒҝ')+'</button><span class="small">'+filtered.length+'д»¶</span></div>';if(conn==='error')html+='<div class="error">'+esc(errMsg)+'</div>';html+='<div class="list">';if(conn==='connecting'){html+='<div class="empty">Google SheetsгҒ«жҺҘз¶ҡдёӯ...</div>'}else if(filtered.length===0){html+='<div class="empty">дәҲзҙ„гҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“</div>'}else{filtered.forEach(function(r){var sc=r.shopCode||r.shop||'';html+='<div class="card shop-'+esc(sc)+'"><div class="row between"><div class="row"><span class="badge badge-'+esc(sc)+'">'+esc(shopName(sc))+'</span><b>'+esc(toJp(r.date))+'</b><b style="color:#534AB7">'+esc(formatTime(r.time))+'</b><span class="badge">'+esc(r.status||'0')+'</span></div><div><button onclick="openEdit(\''+esc(r.id)+'\')">з·ЁйӣҶ</button> <button class="btn-green" onclick="sendPdfMail(\''+esc(r.id)+'\')">рҹ“§PDFйҖҒдҝЎ</button> <button class="btn-danger" onclick="delRes(\''+esc(r.id)+'\')">еүҠйҷӨ</button></div></div><div class="body"><div><strong>'+esc(r.customer||'пјҚ')+'</strong>гҖҖвҳҺ '+esc(normalizePhone(r.phone)||'пјҚ')+'</div><div>гӮӯгғЈгӮ№гғҲпјҡ<strong>'+esc(r.cast||'пјҚ')+'</strong></div><div>жҢҮеҗҚзҠ¶жіҒпјҡ<strong>'+esc(r.shimei||'гғ•гғӘгғј')+'</strong></div><div>е ҙжүҖпјҡ<strong>'+esc(r.place||'пјҚ')+'</strong></div><div>'+esc(r.hotel||'пјҚ')+'гҖҖ<strong>'+(r.room?esc(r.room)+'еҸ·е®Ө':'пјҚ')+'</strong></div><div>гӮігғјгӮ№пјҡ<strong>'+esc(r.course||'пјҚ')+'</strong></div></div><div class="row" style="border-top:1px solid #eee;margin-top:8px;padding-top:8px">';STATUS.forEach(function(s){html+='<button class="'+(r.status===s?'btn-primary':'')+'" onclick="chStatus(\''+esc(r.id)+'\',\''+esc(s)+'\')">'+esc(s)+'</button>'});html+='</div>'+'</div>'})}html+='</div>';root.innerHTML=html;renderModal();if(restoreSearch){var si=document.getElementById('searchInput');if(si){si.focus();si.setSelectionRange(selStart,selEnd)}}}
function keepFormValues(){
  if(!showForm) return;
  var el;
  el=document.getElementById('inputDate'); if(el) form.date=el.value;
  el=document.getElementById('inputTime'); if(el) form.time=el.value;
  el=document.getElementById('inputCustomer'); if(el) form.customer=el.value;
  el=document.getElementById('inputPhone'); if(el) form.phone=normalizePhone(el.value);
  el=document.getElementById('inputCast'); if(el) form.cast=el.value;
  el=document.getElementById('inputShimei'); if(el) form.shimei=el.value;
  el=document.getElementById('inputPlace'); if(el) form.place=el.value;
  el=document.getElementById('inputStatus'); if(el) form.status=el.value;
  el=document.getElementById('inputHotel'); if(el) form.hotel=el.value;
  el=document.getElementById('inputRoom'); if(el) form.room=el.value;
  el=document.getElementById('inputCourse'); if(el) form.course=el.value;
}
function renderModal(){
  keepFormValues();
  var bg=document.getElementById('modalBg');
  if(!showForm){bg.className='modal-bg';bg.innerHTML='';return}
  var courses=COURSES_BY_SHOP[form.shop||'T']||COURSES_BY_SHOP.T;
  var html='';
  html+='<div class="modal">';
  html+='<div class="row between" style="margin-bottom:16px"><h3>'+(editId?'дәҲзҙ„гӮ’з·ЁйӣҶ':'ж–°иҰҸдәҲзҙ„зҷ»йҢІ')+'</h3><button onclick="closeForm()">Г—</button></div>';
  html+='<div class="form-grid">';
  html+='<div class="span2"><label>еә—иҲ—</label><div class="row"><button class="'+(form.shop==='T'?'btn-t':'')+'" style="flex:1" onclick="setShop(\'T\')">гғҶгӮЈгӮўгғ©</button><button class="'+(form.shop==='C'?'btn-c':'')+'" style="flex:1" onclick="setShop(\'C\')">гӮӯгғҘгғјгғҲ</button></div></div>';
  html+=field('date','ж—Ҙд»ҳ *','date','inputDate');
  html+=field('time','жҷӮй–“ *','time','inputTime');
  html+=field('customer','гҒҠе®ўж§ҳеҗҚ *','text','inputCustomer');
  html+=field('phone','йӣ»и©ұз•ӘеҸ· *','tel','inputPhone');
  html+='<div><label>гӮӯгғЈгӮ№гғҲ</label><input id="inputCast" list="cast-list" value="'+esc(form.cast||'')+'" oninput="form.cast=this.value" onchange="form.cast=this.value"><datalist id="cast-list">'+CASTS.map(function(c){return'<option value="'+esc(c)+'">'}).join('')+'</datalist></div>';
  html+='<div><label>жҢҮеҗҚзҠ¶жіҒ</label><select id="inputShimei" onchange="form.shimei=this.value" oninput="form.shimei=this.value">'+['гғ•гғӘгғј','еҶҷжҢҮ','жң¬жҢҮ','зү№еүІ'].map(function(v){return'<option '+((form.shimei||'гғ•гғӘгғј')===v?'selected':'')+' value="'+v+'">'+v+'</option>'}).join('')+'</select></div>';
  html+=field('place','е ҙжүҖ','text','inputPlace');
  html+='<div><label>еүІеј•</label><select id="inputStatus" onchange="form.status=this.value" oninput="form.status=this.value">'+STATUS.map(function(v){return'<option '+((form.status||'0')===v?'selected':'')+' value="'+v+'">'+(v==='0'?'еүІеј•гҒӘгҒ—':v+'еҶҶ')+'</option>'}).join('')+'</select></div>';
  html+='<div><label>гғӣгғҶгғ«</label><input id="inputHotel" type="text" value="'+esc(form.hotel||'')+'" oninput="form.hotel=this.value" onchange="form.hotel=this.value" placeholder="гғӣгғҶгғ«еҗҚгӮ’е…ҘеҠӣ"></div>';
  html+=field('room','йғЁеұӢз•ӘеҸ·','text','inputRoom');
  html+='<div><label>гӮігғјгӮ№</label><select id="inputCourse" onchange="setCourse(this.value)" oninput="setCourse(this.value)">'+courses.map(function(c){return'<option '+((form.course||'')===c.l?'selected':'')+' value="'+c.l+'">'+c.l+'</option>'}).join('')+'</select></div>';
  html+='</div>';
  html+='<div class="form-actions"><button onclick="closeForm()">гӮӯгғЈгғігӮ»гғ«</button><button class="btn-primary" onclick="save()" '+(syncing?'disabled':'')+'>зҷ»йҢІгҒҷгӮӢ</button></div>';
  html+='</div>';
  bg.innerHTML=html;
  bg.className='modal-bg show';
}
function field(name,label,type,id){return'<div><label>'+label+'</label><input id="'+(id||('input_'+name))+'" type="'+type+'" value="'+esc(form[name]||'')+'" oninput="setFormField(\''+name+'\',this.value)" onchange="setFormField(\''+name+'\',this.value)"></div>'}
function setFormField(k,v){if(k==='phone')v=normalizePhone(v);form[k]=v}
function setShop(s){keepFormValues();var c=COURSES_BY_SHOP[s][0];form.shop=s;form.course=c.l;renderModal()}
function setCourse(v){form.course=v}
function openNew(shop){form=makeEmpty(shop);editId=null;showForm=true;renderModal()}
function openEdit(id){var r=rows.find(function(x){return String(x.id)===String(id)});if(!r)return;form=Object.assign(makeEmpty(r.shopCode||r.shop||'T'),r,{
  shop:r.shopCode||r.shop||'T',
  cast:r.cast||'',
  shimei:r.shimei||'гғ•гғӘгғј'
});editId=r.id;showForm=true;renderModal()}
function closeForm(){showForm=false;renderModal()}
async function save(){keepFormValues();if(!form.date||!form.time||!form.customer||!form.phone){msg('вҡ  ж—Ҙд»ҳгғ»жҷӮй–“гғ»гҒҠе®ўж§ҳеҗҚгғ»йӣ»и©ұз•ӘеҸ·гҒҜеҝ…й ҲгҒ§гҒҷ');return}syncing=true;renderModal();var shop=SHOPS.find(function(s){return s.code===form.shop});var base=Object.assign({},form,{time:formatTime(form.time),phone:normalizePhone(form.phone),shopCode:form.shop,shimei:form.shimei||'гғ•гғӘгғј',place:form.place||'',status:form.status||'0',shopName:shop?shop.name:''});if(editId){var upd=Object.assign({},base,{id:editId});rows=rows.map(function(r){return String(r.id)===String(editId)?upd:r});var res=await post({action:'update',data:upd});msg(res.success?'вң“ жӣҙж–°гҒ—гҒҫгҒ—гҒҹ':'вҡ  гӮЁгғ©гғј: '+(res.error||''))}else{var nid=String(_id++);var item=Object.assign({},base,{id:nid});rows.unshift(item);var res2=await post({action:'add',data:item});if(res2.success){rows=rows.map(function(x){return x.id===nid?Object.assign({},x,{id:res2.id}):x});msg('вң“ гӮ·гғјгғҲгҒ«дҝқеӯҳгҒ—гҒҫгҒ—гҒҹ')}else{msg('вҡ  гӮЁгғ©гғј: '+(res2.error||''))}}syncing=false;showForm=false;render()}
function delRes(id){if(!confirm('гҒ“гҒ®дәҲзҙ„гӮ’еүҠйҷӨгҒ—гҒҫгҒҷгҒӢпјҹ'))return;rows=rows.filter(function(r){return String(r.id)!==String(id)});render();post({action:'delete',id:String(id)}).then(function(res){msg(res.success?'вң“ еүҠйҷӨгҒ—гҒҫгҒ—гҒҹ':'вҡ  гӮЁгғ©гғј: '+(res.error||''))})}
function chStatus(id,s){var r=rows.find(function(x){return String(x.id)===String(id)});if(!r)return;r.status=s;render();post({action:'update',data:r}).then(function(){msg('вҶ’ '+s)})}

async function sendPdfMail(id){
  if(!id){msg('вҡ  дәҲзҙ„IDгҒҢгҒӮгӮҠгҒҫгҒӣгӮ“');return}
  if(!confirm('PDFгғЎгғјгғ«гӮ’йҖҒдҝЎгҒ—гҒҫгҒҷгҒӢпјҹ'))return;

  var res=await post({
    action:'sendPdfMail',
    reservationId:String(id)
  });

  if(res.success){
    msg('вң“ PDFгғЎгғјгғ«йҖҒдҝЎгҒ—гҒҫгҒ—гҒҹ');
  }else{
    msg('вҡ  PDFйҖҒдҝЎгӮЁгғ©гғј: '+(res.error||'дёҚжҳҺгҒӘгӮЁгғ©гғј'));
  }
}
function exportCSV(){var h='ж—Ҙд»ҳ,жҷӮй–“,еә—иҲ—,жҢҮеҗҚзҠ¶жіҒ,е ҙжүҖ,гӮӯгғЈгӮ№гғҲ,гҒҠе®ўж§ҳеҗҚ,йӣ»и©ұз•ӘеҸ·,гғӣгғҶгғ«,йғЁеұӢз•ӘеҸ·,гӮігғјгӮ№,еүІеј•';var lines=getFiltered().map(function(x){return [x.date,formatTime(x.time),x.shopCode||x.shop||'',x.shimei||'',x.place||'',x.cast,x.customer,normalizePhone(x.phone),x.hotel,x.room,x.course,x.status].join(',')});var blob=new Blob(['\uFEFF'+[h].concat(lines).join('\n')],{type:'text/csv;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='дәҲзҙ„дёҖиҰ§_'+td()+'.csv';a.click()}
form=makeEmpty('T');render();load();
