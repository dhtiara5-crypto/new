<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px}button,input,select,textarea{font:inherit}input,select,textarea{width:100%;border:1px solid #ccc;border-radius:8px;padding:8px 10px;background:#fff}button{border:1px solid #ccc;border-radius:8px;background:#fff;padding:7px 12px;cursor:pointer}button:hover{background:#f0f0ec}.btn-primary{background:#534AB7;color:#fff;border-color:#534AB7}.btn-t{background:#C8420A;color:#fff;border-color:#C8420A}.btn-c{background:#0A7AC8;color:#fff;border-color:#0A7AC8}.btn-danger{color:#A32D2D;border-color:#F09595}.btn-green{color:#27500A;border-color:#97C459}.topbar{background:#fff;border-bottom:1px solid #ddd;padding:12px 16px;display:flex;gap:10px;align-items:center;position:sticky;top:0;z-index:10;box-shadow:0 1px 4px rgba(0,0,0,.06)}.title{font-weight:700;font-size:16px;margin-right:auto}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#E8A020;margin-right:5px}.dot.ok{background:#3B6D11}.dot.err{background:#aaa}.stat-row{display:flex;gap:8px;padding:10px 12px}.stat{flex:1;background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:10px 14px}.stat-label{font-size:11px;color:#888}.stat-val{font-size:20px;font-weight:700}.tabs,.toolbar{display:flex;gap:8px;align-items:center;background:#fff;border-bottom:1px solid #e5e5e5;padding:8px 12px;flex-wrap:wrap}.tab{padding:6px 14px;border:1px solid #ccc;border-radius:99px;cursor:pointer}.tab.active-all{background:#534AB7;color:#fff}.tab.active-T{background:#C8420A;color:#fff}.tab.active-C{background:#0A7AC8;color:#fff}.list{padding:10px 12px 80px}.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}.card.shop-T{border-left:4px solid #C8420A}.card.shop-C{border-left:4px solid #0A7AC8}.row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}.between{justify-content:space-between}.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:99px;background:#EEEDFE;color:#3C3489}.badge-T{background:#FDE8DF;color:#C8420A}.badge-C{background:#DCF0FC;color:#0A5A96}.body{font-size:13px;color:#666;line-height:1.9;margin-top:8px}.body strong{color:#111}.empty{text-align:center;color:#999;padding:50px 10px}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;border-radius:99px;padding:10px 20px;z-index:99}.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}.modal-bg.show{display:flex}.modal{background:#fff;border-radius:14px;width:100%;max-width:520px;max-height:92vh;overflow:auto;padding:20px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}.span2{grid-column:span 2}label{display:block;font-size:12px;color:#666;margin-bottom:4px}.error{background:#FCEBEB;border:1px solid #F09595;color:#791F1F;border-radius:10px;padding:12px;margin:12px;white-space:pre-wrap;word-break:break-all}.small{font-size:12px;color:#888}@media(max-width:600px){.form-grid{grid-template-columns:1fr}.span2{grid-column:span 1}.stat-row{flex-direction:column}}

/* スマホ入力画面をコンパクト化 */
.form-actions{position:sticky;bottom:0;background:#fff;padding:10px 0 0;margin-top:10px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid #eee}
@media(max-width:600px){
  body{font-size:13px}
  input,select,textarea{padding:6px 8px;border-radius:7px;font-size:16px;min-height:38px}
  button{padding:6px 10px}
  label{font-size:11px;margin-bottom:2px}
  .modal-bg{align-items:flex-start;padding:6px}
  .modal{max-height:96dvh;padding:10px 12px;border-radius:10px;max-width:none}
  .form-grid{gap:7px 8px}
  .modal h3{font-size:16px}
  .topbar{padding:8px 10px}
  .stat-row{padding:6px 8px}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="modalBg" class="modal-bg"></div>
<div id="toast" class="toast" style="display:none"></div>
<script>
window.onerror=function(msg,src,line,col,err){document.getElementById('root').innerHTML='<div class="error"><b>画面エラー</b>\n'+msg+'\n行:'+line+' 列:'+col+'</div>';};
var GAS_URL='https://script.google.com/macros/s/AKfycbwfWqmkUPUi4Q2bwwSi01lW4xqCgtb84Ut6MpuwJDgHr7oYR11y_CTQHOosdZNxSA7N/exec';
var SHOPS=[{code:'T',name:'ティアラ'},{code:'C',name:'キュート'}];
var COURSES_BY_SHOP={T:[{l:'60',p:17000},{l:'70',p:19000},{l:'80',p:21000},{l:'90',p:23000},{l:'120',p:33000},{l:'150',p:41000},{l:'180',p:49000}],C:[{l:'60',p:16000},{l:'80',p:21000},{l:'100',p:26000},{l:'120',p:31000},{l:'140',p:36000},{l:'160',p:41000},{l:'180',p:46000}]};
var CASTS=['ユリカ','ホノカ','レン','サナ','カレン','スモモ','リンカ','トモ','ユウキ','マシロ','チカ','ナナコ','ヒナタ','ナミ','メグ','カスミ'];
var HOTELS=['シティ','アイネイン','モーテル','HP','ラペ','ハイハイ','その他'];
var STATUS=['0','-1000','-2000','-3000','-4000'];
var rows=[],shopFilter='all',todayOnly=false,searchText='',showForm=false,editId=null,form={},syncing=false,_id=9000,conn='connecting',errMsg='';
function td(){return new Date().toISOString().slice(0,10)}
function makeEmpty(shop){shop=shop||'T';var c=COURSES_BY_SHOP[shop][0];return{date:td(),time:'',shop:shop,cast:'',customer:'',phone:'',hotel:'シティ',room:'',course:c.l,status:'0',shimei:'フリー',place:''}}
function normalizePhone(v){var phone=String(v||'').replace(/[^0-9]/g,'');if(phone&&phone.charAt(0)!=='0'&&phone.length>=10&&phone.length<=11){phone='0'+phone}return phone}
function formatTime(v){if(!v)return'';var s=String(v);var m=s.match(/(\d{1,2}):(\d{2})/);if(m)return m[1].padStart(2,'0')+':'+m[2];var d=new Date(v);if(!isNaN(d.getTime()))return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');return''}
function toJp(d){if(!d)return'';var p=String(d).split('-');return p.length===3?p[1]+'/'+p[2]:d}
function fp(n){var v=Number(n);return !v?'－':v.toLocaleString('ja-JP')+'円'}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function msg(t){var el=document.getElementById('toast');el.textContent=t;el.style.display='block';setTimeout(function(){el.style.display='none'},3000)}
function shopName(code){return code==='T'?'ティアラ':code==='C'?'キュート':(code||'')}
function post(payload){return fetch(GAS_URL,{method:'POST',redirect:'follow',body:JSON.stringify(payload)}).then(function(r){return r.text()}).then(function(t){try{return JSON.parse(t)}catch(e){return{success:false,error:'JSONエラー:'+t.slice(0,100)}}}).catch(function(e){return{success:false,error:e.message}})}
function load(){conn='connecting';syncing=true;render();fetch(GAS_URL,{redirect:'follow'}).then(function(r){return r.text()}).then(function(t){var d;try{d=JSON.parse(t)}catch(e){throw new Error('GASの応答がJSONではありません\n'+t.slice(0,300))}if(d.success){rows=(d.data||[]).map(function(x){x.phone=normalizePhone(x.phone);x.shopCode=x.shopCode||x.shop||'';x.shimei=x.shimei||'フリー';x.place=x.place||'';x.time=formatTime(x.time);return x});conn='ok';msg('✓ '+rows.length+'件を読み込みました')}else{conn='error';errMsg=d.error||'不明なエラー'}}).catch(function(e){conn='error';errMsg=e.message}).finally(function(){syncing=false;render()})}
function getFiltered(){var list=rows.filter(function(r){if(shopFilter!=='all'&&(r.shopCode||r.shop)!==shopFilter)return false;if(todayOnly&&r.date!==td())return false;if(searchText){var q=searchText.toLowerCase();return [r.customer,r.cast,r.phone,r.hotel,r.room,r.place,r.shimei].some(function(v){return String(v||'').toLowerCase().indexOf(q)>=0})}return true});list.sort(function(a,b){return String(a.date+a.time)<String(b.date+b.time)?1:-1});return list}
function render(){var root=document.getElementById('root');var todayRows=rows.filter(function(r){return r.date===td()});var cntT=todayRows.filter(function(r){return (r.shopCode||r.shop)==='T'}).length;var cntC=todayRows.filter(function(r){return (r.shopCode||r.shop)==='C'}).length;var filtered=getFiltered();var html='';html+='<div class="topbar"><b class="title">予約管理</b><span class="small"><span class="dot '+(conn==='ok'?'ok':conn==='error'?'err':'')+'"></span>'+(conn==='ok'?'シート連携中':conn==='error'?'接続エラー':'接続中...')+'</span><button class="btn-green" onclick="load()">再読込</button><button onclick="exportCSV()">CSV</button></div>';html+='<div class="stat-row"><div class="stat"><div class="stat-label">本日 全体</div><div class="stat-val">'+todayRows.length+' 件</div></div><div class="stat"><div class="stat-label">ティアラ</div><div class="stat-val">'+cntT+' 件</div></div><div class="stat"><div class="stat-label">キュート</div><div class="stat-val">'+cntC+' 件</div></div></div>';html+='<div class="tabs"><span class="tab '+(shopFilter==='all'?'active-all':'')+'" onclick="shopFilter=\'all\';render()">全店舗</span><span class="tab '+(shopFilter==='T'?'active-T':'')+'" onclick="shopFilter=\'T\';render()">ティアラ</span><span class="tab '+(shopFilter==='C'?'active-C':'')+'" onclick="shopFilter=\'C\';render()">キュート</span><span style="margin-left:auto"></span><button class="btn-t" onclick="openNew(\'T\')">＋T</button><button class="btn-c" onclick="openNew(\'C\')">＋C</button></div>';html+='<div class="toolbar"><input style="flex:1;min-width:170px" placeholder="名前・キャスト・電話・ホテルで検索" value="'+esc(searchText)+'" oninput="searchText=this.value;render()"><button class="'+(todayOnly?'btn-primary':'')+'" onclick="todayOnly=!todayOnly;render()">'+(todayOnly?'✓ 当日':'当日のみ')+'</button><span class="small">'+filtered.length+'件</span></div>';if(conn==='error')html+='<div class="error">'+esc(errMsg)+'</div>';html+='<div class="list">';if(conn==='connecting'){html+='<div class="empty">Google Sheetsに接続中...</div>'}else if(filtered.length===0){html+='<div class="empty">予約が見つかりません</div>'}else{filtered.forEach(function(r){var sc=r.shopCode||r.shop||'';html+='<div class="card shop-'+esc(sc)+'"><div class="row between"><div class="row"><span class="badge badge-'+esc(sc)+'">'+esc(shopName(sc))+'</span><b>'+esc(toJp(r.date))+'</b><b style="color:#534AB7">'+esc(formatTime(r.time))+'</b><span class="badge">'+esc(r.status||'0')+'</span></div><div><button onclick="openEdit(\''+esc(r.id)+'\')">編集</button> <button class="btn-green" onclick="sendPdfMail(\''+esc(r.id)+'\')">📧PDF送信</button> <button class="btn-danger" onclick="delRes(\''+esc(r.id)+'\')">削除</button></div></div><div class="body"><div><strong>'+esc(r.customer||'－')+'</strong>　☎ '+esc(normalizePhone(r.phone)||'－')+'</div><div>キャスト：<strong>'+esc(r.cast||'－')+'</strong></div><div>指名状況：<strong>'+esc(r.shimei||'フリー')+'</strong></div><div>場所：<strong>'+esc(r.place||'－')+'</strong></div><div>'+esc(r.hotel||'－')+'　<strong>'+(r.room?esc(r.room)+'号室':'－')+'</strong></div><div>コース：<strong>'+esc(r.course||'－')+'</strong></div></div><div class="row" style="border-top:1px solid #eee;margin-top:8px;padding-top:8px">';STATUS.forEach(function(s){html+='<button class="'+(r.status===s?'btn-primary':'')+'" onclick="chStatus(\''+esc(r.id)+'\',\''+esc(s)+'\')">'+esc(s)+'</button>'});html+='</div>'+'</div>'})}html+='</div>';root.innerHTML=html;renderModal()}
function renderModal(){var bg=document.getElementById('modalBg');if(!showForm){bg.className='modal-bg';bg.innerHTML='';return}var courses=COURSES_BY_SHOP[form.shop||'T']||COURSES_BY_SHOP.T;var html='<div class="modal"><div class="row between" style="margin-bottom:16px"><h3>'+(editId?'予約を編集':'新規予約登録')+'</h3><button onclick="closeForm()">×</button></div><div class="form-grid"><div class="span2"><label>店舗</label><div class="row"><button class="'+(form.shop==='T'?'btn-t':'')+'" style="flex:1" onclick="setShop(\'T\')">ティアラ</button><button class="'+(form.shop==='C'?'btn-c':'')+'" style="flex:1" onclick="setShop(\'C\')">キュート</button></div></div>'+field('date','日付 *','date')+field('time','時間 *','time')+field('customer','お客様名 *','text')+field('phone','電話番号 *','tel')+'<div><label>キャスト</label><input list="cast-list" value="'+esc(form.cast)+'" oninput="form.cast=this.value"><datalist id="cast-list">'+CASTS.map(function(c){return'<option value="'+esc(c)+'">'}).join('')+'</datalist></div><div><label>指名状況</label><select onchange="form.shimei=this.value">'+['フリー','写指','本指','特割'].map(function(v){return'<option '+(form.shimei===v?'selected':'')+' value="'+v+'">'+v+'</option>'}).join('')+'</select></div>'+field('place','場所','text')+'<div><label>割引</label><select onchange="form.status=this.value">'+STATUS.map(function(v){return'<option '+(form.status===v?'selected':'')+' value="'+v+'">'+(v==='0'?'割引なし':v+'円')+'</option>'}).join('')+'</select></div><div><label>ホテル</label><input type="text" value="'+esc(form.hotel||'')+'" oninput="form.hotel=this.value" placeholder="ホテル名を入力"></div>'+field('room','部屋番号','text')+'<div><label>コース</label><select onchange="setCourse(this.value)">'+courses.map(function(c){return'<option '+(form.course===c.l?'selected':'')+' value="'+c.l+'">'+c.l+'</option>'}).join('')+'</select></div></div><div class="form-actions"><button onclick="closeForm()">キャンセル</button><button class="btn-primary" onclick="save()" '+(syncing?'disabled':'')+'>登録する</button></div></div>';bg.innerHTML=html;bg.className='modal-bg show'}
function field(name,label,type){return'<div><label>'+label+'</label><input type="'+type+'" value="'+esc(form[name])+'" oninput="setFormField(\''+name+'\',this.value)"></div>'}
function setFormField(k,v){if(k==='phone')v=normalizePhone(v);form[k]=v}
function setShop(s){var c=COURSES_BY_SHOP[s][0];form.shop=s;form.course=c.l;renderModal()}
function setCourse(v){var c=(COURSES_BY_SHOP[form.shop]||[]).find(function(x){return x.l===v});form.course=v;renderModal()}
function openNew(shop){form=makeEmpty(shop);editId=null;showForm=true;renderModal()}
function openEdit(id){var r=rows.find(function(x){return String(x.id)===String(id)});if(!r)return;form=Object.assign(makeEmpty(r.shopCode||r.shop||'T'),r,{shop:r.shopCode||r.shop||'T'});editId=r.id;showForm=true;renderModal()}
function closeForm(){showForm=false;renderModal()}
async function save(){if(!form.date||!form.time||!form.customer||!form.phone){msg('⚠ 日付・時間・お客様名・電話番号は必須です');return}syncing=true;renderModal();var shop=SHOPS.find(function(s){return s.code===form.shop});var base=Object.assign({},form,{time:formatTime(form.time),phone:normalizePhone(form.phone),shopCode:form.shop,shimei:form.shimei||'フリー',place:form.place||'',status:form.status||'0',shopName:shop?shop.name:''});if(editId){var upd=Object.assign({},base,{id:editId});rows=rows.map(function(r){return String(r.id)===String(editId)?upd:r});var res=await post({action:'update',data:upd});msg(res.success?'✓ 更新しました':'⚠ エラー: '+(res.error||''))}else{var nid=String(_id++);var item=Object.assign({},base,{id:nid});rows.unshift(item);var res2=await post({action:'add',data:item});if(res2.success){rows=rows.map(function(x){return x.id===nid?Object.assign({},x,{id:res2.id}):x});msg('✓ シートに保存しました')}else{msg('⚠ エラー: '+(res2.error||''))}}syncing=false;showForm=false;render()}
function delRes(id){if(!confirm('この予約を削除しますか？'))return;rows=rows.filter(function(r){return String(r.id)!==String(id)});render();post({action:'delete',id:String(id)}).then(function(res){msg(res.success?'✓ 削除しました':'⚠ エラー: '+(res.error||''))})}
function chStatus(id,s){var r=rows.find(function(x){return String(x.id)===String(id)});if(!r)return;r.status=s;render();post({action:'update',data:r}).then(function(){msg('→ '+s)})}

async function sendPdfMail(id){
  if(!id){msg('⚠ 予約IDがありません');return}
  if(!confirm('PDFメールを送信しますか？'))return;
  var res=await post({action:'sendPdfMail',reservationId:String(id)});
  if(res.success){
    msg('✓ PDFメール送信しました');
  }else{
    msg('⚠ PDF送信エラー: '+(res.error||'不明なエラー'));
  }
}
function exportCSV(){var h='日付,時間,店舗,指名状況,場所,キャスト,お客様名,電話番号,ホテル,部屋番号,コース,割引';var lines=getFiltered().map(function(x){return [x.date,formatTime(x.time),x.shopCode||x.shop||'',x.shimei||'',x.place||'',x.cast,x.customer,normalizePhone(x.phone),x.hotel,x.room,x.course,x.status].join(',')});var blob=new Blob(['\uFEFF'+[h].concat(lines).join('\n')],{type:'text/csv;charset=utf-8'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='予約一覧_'+td()+'.csv';a.click()}
form=makeEmpty('T');render();load();
</script>
</body>
</html>
